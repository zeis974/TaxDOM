<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        const THEME_COOKIE_KEY = "theme"
        const FALLBACK_THEME = "dark"
        const VALID_THEMES = new Set(["system", "light", "dark"])

        const escapedKey = THEME_COOKIE_KEY.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")
        const match = document.cookie.match(new RegExp(`(?:^|;\\s*)${escapedKey}=([^;]*)`))

        let storedTheme = null
        if (match?.[1]) {
          try {
            storedTheme = decodeURIComponent(match[1])
          } catch {
            storedTheme = match[1]
          }
        }

        const selectedTheme =
          storedTheme && VALID_THEMES.has(storedTheme) ? storedTheme : FALLBACK_THEME

        const resolvedTheme =
          selectedTheme === "system" &&
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : selectedTheme === "system"
              ? "light"
              : selectedTheme

        const root = document.documentElement
        root.classList.remove("light", "dark")
        root.classList.add(resolvedTheme)
        root.setAttribute("data-theme", resolvedTheme)
        root.style.colorScheme = resolvedTheme
        root.style.backgroundColor = resolvedTheme === "dark" ? "#121212" : "#ffffff"
      })()
    </script>
    <title>Dashboard | TaxDOM</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
