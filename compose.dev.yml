services:
  db:
    image: postgres:18.1-alpine
    restart: always
    ports:
      - 5432:5432
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: postgres

  meilisearch:
    image: getmeili/meilisearch:v1.43.0
    container_name: taxdom_meilisearch
    ports:
      - "7700:7700"
    env_file: .env.local
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  meilisearch_data:
