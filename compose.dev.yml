services:
  db:
    image: postgres:18.4-alpine
    container_name: taxdom_db
    restart: unless-stopped
    ports:
      - 5432:5432
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: postgres

  redis:
    image: redis:8.6.3-alpine
    container_name: taxdom_redis
    restart: unless-stopped
    ports:
      - 6379:6379

  chroma:
    image: chromadb/chroma:1.5.9
    container_name: taxdom_chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:0.30.8
    container_name: taxdom_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot sidecar: pulls the embedding model once Ollama is healthy, then exits.
  ollama-pull:
    image: curlimages/curl:8.20.0
    container_name: taxdom_ollama_pull
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    command: >
      -fsS -X POST http://ollama:11434/api/pull
      -H "Content-Type: application/json"
      -d '{"name":"bge-m3"}'

volumes:
  chroma_data:
  ollama_data:
